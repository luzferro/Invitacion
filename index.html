<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - María Luz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');
body{
margin:0;
background:#000000;
color:white;
text-align:center;
font-family:'Playfair Display',serif;
}
section{
position:relative;
overflow:hidden;
}
.portada{
height:92vh;
background:#000000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}
.nombre{
font-family:'Great Vibes',cursive;
font-size:92px;
font-weight:400;
margin:0;
color:white;
text-shadow:0 0 16px rgba(255,255,255,.55);
line-height:.9;
}
.subtitulo{
font-size:25px;
letter-spacing:11px;
margin-top:18px;
}
.disco{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
background:
linear-gradient(90deg, transparent 47%, white 48%, white 52%, transparent 53%),
linear-gradient(0deg, transparent 47%, white 48%, white 52%, transparent 53%),
repeating-linear-gradient(90deg, transparent 0 17px, white 18px 20px),
repeating-linear-gradient(0deg, transparent 0 17px, white 18px 20px);
box-shadow:0 0 20px rgba(255,255,255,.65);
}
.disco::before{
content:"";
position:absolute;
left:50%;
top:-80px;
width:3px;
height:80px;
background:white;
}
.disco1{
top:130px;
left:35px;
}
.disco2{
bottom:95px;
right:32px;
}
.star{
position:absolute;
color:white;
font-size:48px;
text-shadow:0 0 12px white;
}
.s1{top:145px;right:70px;}
.s2{top:185px;left:25px;}
.s3{bottom:95px;left:65px;}
.s4{bottom:170px;right:22px;}
.cuando{
background:#000000;
padding:70px 20px 95px;
}
.cuando h2{
font-size:58px;
margin:0 0 45px;
}
.fecha{
font-size:31px;
margin:0;
}
.brillo-cuando{
position:absolute;
right:35px;
top:25px;
font-size:46px;
text-shadow:0 0 12px white;
}
.contador-section{
background:white;
color:black;
padding:50px 8px 60px;
}
.bola-mini{
position:absolute;
left:8px;
top:20px;
width:95px;
height:95px;
border-radius:50%;
border:3px solid black;
background:
linear-gradient(90deg, transparent 47%, black 48%, black 52%, transparent 53%),
linear-gradient(0deg, transparent 47%, black 48%, black 52%, transparent 53%),
repeating-linear-gradient(90deg, transparent 0 14px, black 15px 17px),
repeating-linear-gradient(0deg, transparent 0 14px, black 15px 17px);
opacity:.9;
}
.faltan{
font-size:62px;
margin:0 0 35px;
}
.contador{
display:flex;
justify-content:center;
gap:6px;
}
.item{
width:78px;
}
.circulo{
width:70px;
height:70px;
border:4px solid black;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:29px;
margin:auto;
}
.label{
font-size:17px;
margin-top:8px;
}
.lugar{
background:#000000;
padding:65px 20px 90px;
}
.lugar h2{
font-size:58px;
margin:0 0 38px;
}
.lugar p{
font-size:31px;
line-height:1.25;
margin:0 0 18px;
}
.direccion{
font-size:20px;
line-height:1.35;
opacity:.9;
margin-bottom:40px;
}
.boton{
display:inline-block;
background:white;
color:black;
font-size:30px;
padding:18px 48px;
border-radius:60px;
text-decoration:none;
font-weight:700;
}
.brillo-lugar{
position:absolute;
font-size:55px;
color:white;
text-shadow:0 0 12px white;
}
.b1{left:25px;bottom:70px;}
.b2{left:90px;bottom:38px;}
@media(max-width:380px){
.nombre{
font-size:84px;
}
.cuando h2{
font-size:52px;
}
.fecha{
font-size:28px;
}
.faltan{
font-size:56px;
}
.item{
width:72px;
}
.circulo{
width:64px;
height:64px;
font-size:26px;
}
.label{
font-size:15px;
}
.lugar h2{
font-size:52px;
}
.lugar p{
font-size:28px;
}
}
</style>
</head>
<body>
<section class="portada">
<div class="disco disco1"></div>
<div class="disco disco2"></div>
<div class="star s1">✦</div>
<div class="star s2">✦</div>
<div class="star s3">✦</div>
<div class="star s4">✦</div>
<h1 class="nombre">María Luz</h1>
<div class="subtitulo">MIS XV</div>
</section>
<section class="cuando">
<div class="brillo-cuando">✦</div>
<h2>¿CUÁNDO?</h2>
<p class="fecha">08 de Agosto - 21:00</p>
</section>
<section class="contador-section">
<h2 class="faltan">Faltan</h2>
<div class="contador">
<div class="item">
<div class="circulo" id="dias">0</div>
<div class="label">Días</div>
</div>
<div class="item">
<div class="circulo" id="horas">0</div>
<div class="label">Horas</div>
</div>
<div class="item">
<div class="circulo" id="minutos">0</div>
<div class="label">Minutos</div>
</div>
<div class="item">
<div class="circulo" id="segundos">0</div>
<div class="label">Segundos</div>
</div>
</div>
</section>
<section class="lugar">
<div class="brillo-lugar b1">✦</div>
<div class="brillo-lugar b2">✦</div>
<h2>¿DÓNDE?</h2>
<p>Salón del Colegio<br>De Abogados</p>
<div class="direccion">
Avda. Circunvalación Oeste km 3<br>
4400 Salta
</div>
<a class="boton" href="https://maps.app.goo.gl/HY7zYVSKwhCa7rMa8?g_st=ic" target="_blank">
Cómo llegar
</a>
</section>
<script>
const fechaEvento = new Date("August 8, 2026 21:00:00").getTime();
setInterval(function(){
const ahora = new Date().getTime();
const diferencia = fechaEvento - ahora;
document.getElementById("dias").innerHTML =
Math.floor(diferencia/(1000*60*60*24));
document.getElementById("horas").innerHTML =
Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutos").innerHTML =
Math.floor((diferencia%(1000*60*60))/(1000*60));
document.getElementById("segundos").innerHTML =
Math.floor((diferencia%(1000*60))/1000);
},1000);
</script>
</body>
</html>
