<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis XV - María Luz</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
color:white;
text-align:center;
background:black;
}

.portada{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)),
url('Fondo Brilloso.jpg');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.titulo{
font-size:70px;
font-weight:300;
letter-spacing:3px;
}

.subtitulo{
font-size:28px;
margin-top:10px;
letter-spacing:10px;
}

.contador{
display:flex;
gap:20px;
margin-top:40px;
flex-wrap:wrap;
justify-content:center;
}

.item{
text-align:center;
}

.numero{
font-size:34px;
font-weight:600;
}

.texto{
font-size:12px;
letter-spacing:2px;
}

@media(max-width:600px){

.titulo{
font-size:52px;
}

.subtitulo{
font-size:20px;
letter-spacing:6px;
}

.numero{
font-size:26px;
}

}

</style>
</head>

<body>

<section class="portada">

<div class="titulo">
MIS XV<br>
MARÍA LUZ
</div>

<div class="contador">

<div class="item">
<div class="numero" id="dias">0</div>
<div class="texto">DÍAS</div>
</div>

<div class="item">
<div class="numero" id="horas">0</div>
<div class="texto">HORAS</div>
</div>

<div class="item">
<div class="numero" id="minutos">0</div>
<div class="texto">MINUTOS</div>
</div>

<div class="item">
<div class="numero" id="segundos">0</div>
<div class="texto">SEGUNDOS</div>
</div>

</div>

</section>

<script>
<section style="
background:white;
color:black;
text-align:center;
padding:90px 20px;
">
<div style="font-size:70px;">
📅
</div>
<h2 style="
font-family:'Montserrat',sans-serif;
font-size:45px;
font-weight:300;
margin-top:15px;
letter-spacing:2px;
">
¿CUÁNDO?
</h2>
<p style="
font-size:28px;
margin-top:35px;
letter-spacing:2px;
">
08 DE AGOSTO 2026
</p>
<p style="
font-size:30px;
font-weight:600;
margin-top:25px;
">
21:00 HS
</p>
</section>
const fechaEvento =
new Date("August 8, 2026 21:00:00").getTime();

setInterval(function(){

const ahora = new Date().getTime();
const diferencia = fechaEvento - ahora;

document.getElementById("dias").innerHTML =
Math.floor(diferencia/(1000*60*60*24));

document.getElementById("horas").innerHTML =
Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutos").innerHTML =
Math.floor((diferencia%(1000*60*60))/(1000*60));

document.getElementById("segundos").innerHTML =
Math.floor((diferencia%(1000*60))/1000);

},1000);

</script>

</body>
</html>
