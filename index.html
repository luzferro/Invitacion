<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - María Luz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:black;
color:white;
text-align:center;
}

.portada{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),
url("Fondo Brilloso.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.titulo{
font-size:52px;
font-weight:300;
letter-spacing:8px;
line-height:1.35;
}

.contador{
display:flex;
gap:22px;
margin-top:42px;
justify-content:center;
}

.numero{
font-size:30px;
font-weight:600;
}

.texto{
font-size:12px;
letter-spacing:3px;
margin-top:5px;
}

.cuando{
background:white;
color:black;
padding:90px 20px;
text-align:center;
}

.icono{
font-size:45px;
margin-bottom:20px;
}

.cuando h2{
font-size:38px;
font-weight:400;
letter-spacing:2px;
margin-bottom:30px;
}

.cuando p{
font-size:24px;
letter-spacing:2px;
line-height:1.8;
}

</style>

</head>

<body>

<section class="portada">
<div class="titulo">
MIS XV<br>
MARÍA LUZ
</div>

<div class="contador">
<div>
<div class="numero" id="dias">0</div>
<div class="texto">DÍAS</div>
</div>

<div>
<div class="numero" id="horas">0</div>
<div class="texto">HORAS</div>
</div>

<div>
<div class="numero" id="minutos">0</div>
<div class="texto">MINUTOS</div>
</div>

<div>
<div class="numero" id="segundos">0</div>
<div class="texto">SEGUNDOS</div>
</div>
</div>
</section>

<section class="cuando">
<div class="icono">📅</div>
<h2>¿CUÁNDO?</h2>
<p>08 DE AGOSTO 2026</p>
<p>| 21:00 HS |</p>
</section>

<script>
const fechaEvento = new Date("August 8, 2026 21:00:00").getTime();

setInterval(function(){
const ahora = new Date().getTime();
const diferencia = fechaEvento - ahora;

document.getElementById("dias").innerHTML =
Math.floor(diferencia/(1000*60*60*24));

document.getElementById("horas").innerHTML =
Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutos").innerHTML =
Math.floor((diferencia%(1000*60*60))/(1000*60));

document.getElementById("segundos").innerHTML =
Math.floor((diferencia%(1000*60))/1000);
},1000);
</script>

</body>
</html>
