<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - María Luz</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600;700&display=swap');
body{
margin:0;
background:#211d1e;
color:white;
text-align:center;
font-family:'Playfair Display',serif;
}
section{
position:relative;
overflow:hidden;
}
.portada{
height:92vh;
background:#211d1e;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}
.nombre{
font-family:'Great Vibes',cursive;
font-size:88px;
font-weight:400;
margin:0;
color:white;
text-shadow:0 0 16px rgba(255,255,255,.55);
}
.subtitulo{
font-size:25px;
letter-spacing:11px;
margin-top:15px;
}
.disco{
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:4px solid white;
background:
linear-gradient(90deg, transparent 47%, white 48%, white 52%, transparent 53%),
linear-gradient(0deg, transparent 47%, white 48%, white 52%, transparent 53%),
repeating-linear-gradient(90deg, transparent 0 18px, white 19px 21px),
repeating-linear-gradient(0deg, transparent 0 18px, white 19px 21px);
box-shadow:0 0 18px rgba(255,255,255,.5);
}
.disco::before{
content:"";
position:absolute;
left:50%;
top:-75px;
width:3px;
height:75px;
background:white;
}
.disco1{
top:115px;
left:45px;
}
.disco2{
bottom:105px;
right:45px;
}
.star{
position:absolute;
color:white;
font-size:48px;
text-shadow:0 0 12px white;
}
.s1{top:140px;right:80px;}
.s2{top:170px;left:25px;}
.s3{bottom:90px;left:65px;}
.s4{bottom:170px;right:25px;}
.cuando{
background:#211d1e;
padding:45px 20px 85px;
}
.cuando h2{
font-size:50px;
margin:0 0 35px;
}
.fecha{
font-size:29px;
}
.contador-section{
background:white;
color:black;
padding:45px 8px 55px;
}
.contador-section .decor{
position:absolute;
left:0;
top:15px;
width:115px;
height:115px;
border-radius:50%;
border:3px solid black;
opacity:.8;
}
.contador-section .decor::after{
content:"✦";
position:absolute;
right:-35px;
top:25px;
font-size:35px;
}
.faltan{
font-size:62px;
margin:0 0 35px;
}
.contador{
display:flex;
justify-content:center;
gap:10px;
}
.item{
width:82px;
}
.circulo{
width:72px;
height:72px;
border:4px solid black;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
margin:auto;
}
.label{
font-size:18px;
margin-top:8px;
}
.lugar{
background:#211d1e;
padding:60px 20px 85px;
}
.lugar h2{
font-size:52px;
margin:0 0 35px;
}
.lugar p{
font-size:30px;
line-height:1.25;
margin-bottom:40px;
}
.boton{
display:inline-block;
background:white;
color:black;
font-size:32px;
padding:18px 55px;
border-radius:60px;
text-decoration:none;
font-weight:700;
}
.lugar .brillo{
position:absolute;
font-size:55px;
color:white;
text-shadow:0 0 12px white;
}
.b1{left:25px;bottom:65px;}
.b2{left:85px;bottom:35px;}
@media(max-width:600px){
.nombre{
font-size:92px;
line-height:.9;
}
.subtitulo{
font-size:22px;
letter-spacing:10px;
}
.disco{
width:115px;
height:115px;
}
.disco1{
top:130px;
left:32px;
}
.disco2{
bottom:95px;
right:28px;
}
.cuando{
padding:40px 20px 80px;
}
.cuando h2{
font-size:58px;
}
.fecha{
font-size:30px;
}
.faltan{
font-size:60px;
}
.contador{
gap:6px;
}
.item{
width:78px;
}
.circulo{
width:70px;
height:70px;
font-size:29px;
}
.label{
font-size:17px;
}
.lugar h2{
font-size:58px;
}
.lugar p{
font-size:31px;
}
.boton{
font-size:30px;
padding:18px 48px;
}
}
</style>
</head>
<body>
<section class="portada">
<div class="disco disco1"></div>
<div class="disco disco2"></div>
<div class="star s1">✦</div>
<div class="star s2">✦</div>
<div class="star s3">✦</div>
<div class="star s4">✦</div>
<h1 class="nombre">María Luz</h1>
<div class="subtitulo">MIS XV</div>
</section>
<section class="cuando">
<div class="star s1">✦</div>
<h2>¿CUÁNDO?</h2>
<p class="fecha">08 de Agosto - 21:30</p>
</section>
<section class="contador-section">
<div class="decor"></div>
<h2 class="faltan">Faltan</h2>
<div class="contador">
<div class="item">
<div class="circulo" id="dias">0</div>
<div class="label">Días</div>
</div>
<div class="item">
<div class="circulo" id="horas">0</div>
<div class="label">Horas</div>
</div>
<div class="item">
<div class="circulo" id="minutos">0</div>
<div class="label">Minutos</div>
</div>
<div class="item">
<div class="circulo" id="segundos">0</div>
<div class="label">Segundos</div>
</div>
</div>
</section>
<section class="lugar">
<div class="brillo b1">✦</div>
<div class="brillo b2">✦</div>
<h2>¿DÓNDE?</h2>
<p>Salón del Colegio<br>De Abogados</p>
<a class="boton" href="https://maps.app.goo.gl/PR54WQLHa5z93yK6A?g_st=ic" target="_blank">
Cómo llegar
</a>
</section>
<script>
const fechaEvento = new Date("August 8, 2026 21:30:00").getTime();
setInterval(function(){
const ahora = new Date().getTime();
const diferencia = fechaEvento - ahora;
document.getElementById("dias").innerHTML =
Math.floor(diferencia/(1000*60*60*24));
document.getElementById("horas").innerHTML =
Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutos").innerHTML =
Math.floor((diferencia%(1000*60*60))/(1000*60));
document.getElementById("segundos").innerHTML =
Math.floor((diferencia%(1000*60))/1000);
},1000);
</script>
</body>
</html>
