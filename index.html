<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis XV - María Luz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:black;
color:white;
text-align:center;
}

.portada{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.45)),
url("Fondo Brilloso.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

.titulo-principal{
font-size:50px;
font-weight:300;
letter-spacing:8px;
line-height:1.4;
white-space:nowrap;
}

.nombre{
font-size:48px;
font-weight:300;
letter-spacing:8px;
white-space:nowrap;
margin-top:10px;
}

.contador{
display:flex;
gap:22px;
margin-top:42px;
justify-content:center;
}

.numero{
font-size:30px;
font-weight:600;
}

.texto{
font-size:12px;
letter-spacing:3px;
margin-top:5px;
}

.cuando{
background:black;
color:white;
padding:80px 20px 90px;
text-align:center;
}

.calendario{
width:42px;
height:42px;
border:2px solid white;
margin:0 auto 22px;
position:relative;
border-radius:3px;
}

.calendario:before{
content:"";
position:absolute;
top:10px;
left:0;
width:100%;
height:2px;
background:white;
}

.calendario:after{
content:"";
position:absolute;
top:-8px;
left:9px;
width:22px;
height:10px;
border-left:2px solid white;
border-right:2px solid white;
}

.calendario span{
position:absolute;
font-size:21px;
font-weight:300;
top:15px;
left:50%;
transform:translateX(-50%);
}

.cuando h2{
font-size:26px;
font-weight:600;
letter-spacing:1px;
margin-bottom:12px;
}

.cuando p{
font-size:17px;
font-weight:600;
letter-spacing:.5px;
line-height:1.8;
}

@media(max-width:600px){
.titulo-principal{
font-size:44px;
letter-spacing:7px;
}

.nombre{
font-size:41px;
letter-spacing:7px;
}

.contador{
gap:18px;
}

.numero{
font-size:28px;
}

.texto{
font-size:11px;
}

.cuando{
padding:75px 20px 85px;
}

.cuando h2{
font-size:25px;
}

.cuando p{
font-size:16px;
}
}
</style>

</head>

<body>

<section class="portada">

<div class="titulo-principal">MIS XV</div>
<div class="nombre">MARÍA LUZ</div>

<div class="contador">
<div>
<div class="numero" id="dias">0</div>
<div class="texto">DÍAS</div>
</div>

<div>
<div class="numero" id="horas">0</div>
<div class="texto">HORAS</div>
</div>

<div>
<div class="numero" id="minutos">0</div>
<div class="texto">MINUTOS</div>
</div>

<div>
<div class="numero" id="segundos">0</div>
<div class="texto">SEGUNDOS</div>
</div>
</div>

</section>

<section class="cuando">

<div class="calendario">
<span>8</span>
</div>

<h2>¿CUÁNDO?</h2>
<p>08 DE AGOSTO 2026</p>
<p>| 21:00 HS |</p>

</section>
<section style="
background:white;
color:black;
padding:90px 20px;
text-align:center;
">

<div style="font-size:40px;margin-bottom:18px;">
🪩
</div>

<h2 style="
font-size:28px;
font-weight:400;
letter-spacing:2px;
margin-bottom:12px;
">
¿DÓNDE?
</h2>

<p style="
font-size:20px;
letter-spacing:1px;
margin-bottom:8px;
">
SALÓN DEL COLEGIO DE ABOGADOS
</p>

<p style="
font-size:14px;
line-height:1.7;
margin-bottom:30px;
">
Avda. Circunvalación Oeste km 3<br>
4400 Salta
</p>

<a href="https://maps.app.goo.gl/HY7zYVSKwhCa7rMa8?g_st=ic"
target="_blank"
style="
display:inline-block;
padding:12px 35px;
border:1px solid black;
border-radius:30px;
color:black;
text-decoration:none;
font-size:13px;
letter-spacing:1px;
">
CÓMO LLEGAR </a>

</section>

<section style="
background:black;
color:white;
padding:90px 20px;
text-align:center;
">

<div style="font-size:40px;margin-bottom:18px;">
💎
</div>

<h2 style="
font-size:28px;
font-weight:400;
letter-spacing:2px;
margin-bottom:15px;
">
DRESS CODE
</h2>

<p style="
font-size:20px;
letter-spacing:2px;
margin-bottom:25px;
">
ELEGANTE
</p>

<p style="
font-size:15px;
line-height:1.7;
margin-bottom:25px;
">
Este color está reservado<br>
para la quinceañera
</p>

<div style="
width:60px;
height:60px;
border-radius:50%;
background:#0047AB;
margin:0 auto;
border:2px solid white;
"></div>

</section>

<script>
const fechaEvento = new Date("August 8, 2026 21:00:00").getTime();

setInterval(function(){
const ahora = new Date().getTime();
const diferencia = fechaEvento - ahora;

document.getElementById("dias").innerHTML =
Math.floor(diferencia/(1000*60*60*24));

document.getElementById("horas").innerHTML =
Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutos").innerHTML =
Math.floor((diferencia%(1000*60*60))/(1000*60));

document.getElementById("segundos").innerHTML =
Math.floor((diferencia%(1000*60))/1000);
},1000);
</script>

</body>
</html>
